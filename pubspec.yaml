name: notes_management_app
description: A simple Notes Management App using Flutter and Cloud Firestore.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4

  # Optional: nice UUID / timestamp helpers not required, Firestore auto-IDs are used

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
